<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akıllı Yoklama Sistemi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 10px;
            border-radius: 10px;
        }

        .tab {
            flex: 1;
            padding: 15px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }

        .tab:hover {
            transform: translateY(-2px);
        }

        .content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .video-container {
            text-align: center;
            margin-bottom: 20px;
        }

        video {
            width: 100%;
            max-width: 640px;
            border-radius: 10px;
            border: 3px solid #667eea;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .students-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .student-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }

        .student-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .student-card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 3px solid #667eea;
        }

        .student-card h3 {
            color: #333;
            margin-bottom: 5px;
        }

        .student-card p {
            color: #666;
            margin-bottom: 10px;
        }

        .attendance-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .attendance-table th,
        .attendance-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .attendance-table th {
            background: #667eea;
            color: white;
            font-weight: bold;
        }

        .attendance-table tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }

        .status-present {
            background: #c6f6d5;
            color: #22543d;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #c6f6d5;
            color: #22543d;
            display: block;
        }

        .message.error {
            background: #fed7d7;
            color: #742a2a;
            display: block;
        }

        .date-filter {
            margin-bottom: 20px;
        }

        .date-filter input {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Akıllı Yoklama Sistemi</h1>
            <p>Yüz Tanıma ile Otomatik Yoklama</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('register')">Öğrenci Kayıt</button>
            <button class="tab" onclick="showTab('attendance')">Yoklama Al</button>
            <button class="tab" onclick="showTab('students')">Öğrenciler</button>
            <button class="tab" onclick="showTab('records')">Yoklama Kayıtları</button>
        </div>

        <div class="content">
            <!-- Öğrenci Kayıt -->
            <div id="register" class="tab-content active">
                <h2>Yeni Öğrenci Kaydet</h2>
                <div id="register-message" class="message"></div>
                
                <div class="form-group">
                    <label>Öğrenci No:</label>
                    <input type="text" id="student-id" placeholder="Öğrenci numarasını girin">
                </div>
                
                <div class="form-group">
                    <label>Ad Soyad:</label>
                    <input type="text" id="student-name" placeholder="Öğrenci adını girin">
                </div>

                <div class="video-container">
                    <video id="register-video" autoplay></video>
                </div>

                <div class="controls">
                    <button class="btn btn-primary" onclick="startRegisterCamera()">Kamerayı Başlat</button>
                    <button class="btn btn-success" onclick="captureAndRegister()">Fotoğraf Çek ve Kaydet</button>
                    <button class="btn btn-danger" onclick="stopRegisterCamera()">Kamerayı Durdur</button>
                </div>
            </div>

            <!-- Yoklama Al -->
            <div id="attendance" class="tab-content">
                <h2>Yoklama Al</h2>
                <div id="attendance-message" class="message"></div>

                <div class="video-container">
                    <video id="attendance-video" autoplay></video>
                </div>

                <div class="controls">
                    <button class="btn btn-primary" onclick="startAttendanceCamera()">Kamerayı Başlat</button>
                    <button class="btn btn-success" onclick="markAttendance()">Yoklama İşaretle</button>
                    <button class="btn btn-danger" onclick="stopAttendanceCamera()">Kamerayı Durdur</button>
                </div>
            </div>

            <!-- Öğrenciler -->
            <div id="students" class="tab-content">
                <h2>Kayıtlı Öğrenciler</h2>
                <div id="students-list" class="students-list"></div>
            </div>

            <!-- Yoklama Kayıtları -->
            <div id="records" class="tab-content">
                <h2>Yoklama Kayıtları</h2>
                
                <div class="date-filter">
                    <label>Tarih Filtrele:</label>
                    <input type="date" id="date-filter" onchange="loadAttendanceRecords()">
                </div>

                <table class="attendance-table">
                    <thead>
                        <tr>
                            <th>Öğrenci No</th>
                            <th>Ad Soyad</th>
                            <th>Tarih</th>
                            <th>Saat</th>
                            <th>Durum</th>
                        </tr>
                    </thead>
                    <tbody id="records-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let registerStream = null;
        let attendanceStream = null;

        function showTab(tabName) {
            // Tüm tabları gizle
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // Seçili tabı göster
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            // Tab değiştiğinde ilgili verileri yükle
            if (tabName === 'students') {
                loadStudents();
            } else if (tabName === 'records') {
                loadAttendanceRecords();
            }
        }

        async function startRegisterCamera() {
            try {
                registerStream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('register-video').srcObject = registerStream;
            } catch (error) {
                showMessage('register', 'Kamera erişimi reddedildi', 'error');
            }
        }

        function stopRegisterCamera() {
            if (registerStream) {
                registerStream.getTracks().forEach(track => track.stop());
                document.getElementById('register-video').srcObject = null;
            }
        }

        async function captureAndRegister() {
            const studentId = document.getElementById('student-id').value;
            const studentName = document.getElementById('student-name').value;

            if (!studentId || !studentName) {
                showMessage('register', 'Lütfen tüm alanları doldurun', 'error');
                return;
            }

            const video = document.getElementById('register-video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const imageData = canvas.toDataURL('image/jpeg');

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        student_id: studentId,
                        name: studentName,
                        image: imageData
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    showMessage('register', 'Öğrenci başarıyla kaydedildi!', 'success');
                    document.getElementById('student-id').value = '';
                    document.getElementById('student-name').value = '';
                } else {
                    showMessage('register', data.message, 'error');
                }
            } catch (error) {
                showMessage('register', 'Kayıt sırasında hata oluştu', 'error');
            }
        }

        async function startAttendanceCamera() {
            try {
                attendanceStream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('attendance-video').srcObject = attendanceStream;
            } catch (error) {
                showMessage('attendance', 'Kamera erişimi reddedildi', 'error');
            }
        }

        function stopAttendanceCamera() {
            if (attendanceStream) {
                attendanceStream.getTracks().forEach(track => track.stop());
                document.getElementById('attendance-video').srcObject = null;
            }
        }

        async function markAttendance() {
            const video = document.getElementById('attendance-video');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const imageData = canvas.toDataURL('image/jpeg');

            try {
                const response = await fetch('/api/attendance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: imageData })
                });

                const data = await response.json();
                
                if (data.success) {
                    showMessage('attendance', `Yoklama başarılı! ${data.student.name}`, 'success');
                } else {
                    showMessage('attendance', data.message, 'error');
                }
            } catch (error) {
                showMessage('attendance', 'Yoklama sırasında hata oluştu', 'error');
            }
        }

        async function loadStudents() {
            try {
                const response = await fetch('/api/students');
                const data = await response.json();
                
                const studentsList = document.getElementById('students-list');
                studentsList.innerHTML = '';

                if (data.students.length === 0) {
                    studentsList.innerHTML = '<p>Henüz kayıtlı öğrenci yok</p>';
                    return;
                }

                data.students.forEach(student => {
                    const card = document.createElement('div');
                    card.className = 'student-card';
                    card.innerHTML = `
                        <img src="/static/faces/${student.image}" alt="${student.name}">
                        <h3>${student.name}</h3>
                        <p>No: ${student.student_id}</p>
                        <button class="btn btn-danger" onclick="deleteStudent('${student.student_id}')">Sil</button>
                    `;
                    studentsList.appendChild(card);
                });
            } catch (error) {
                console.error('Öğrenciler yüklenemedi:', error);
            }
        }

        async function deleteStudent(studentId) {
            if (!confirm('Bu öğrenciyi silmek istediğinizden emin misiniz?')) {
                return;
            }

            try {
                const response = await fetch(`/api/students/${studentId}`, {
                    method: 'DELETE'
                });

                const data = await response.json();
                
                if (data.success) {
                    loadStudents();
                }
            } catch (error) {
                console.error('Öğrenci silinemedi:', error);
            }
        }

        async function loadAttendanceRecords() {
            const dateFilter = document.getElementById('date-filter').value;
            let url = '/api/attendance/records';
            
            if (dateFilter) {
                url += `?date=${dateFilter}`;
            }

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                const tbody = document.getElementById('records-tbody');
                tbody.innerHTML = '';

                if (data.records.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">Yoklama kaydı bulunamadı</td></tr>';
                    return;
                }

                data.records.forEach(record => {
                    const date = new Date(record.timestamp);
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${record.student_id}</td>
                        <td>${record.name}</td>
                        <td>${date.toLocaleDateString('tr-TR')}</td>
                        <td>${date.toLocaleTimeString('tr-TR')}</td>
                        <td><span class="status-badge status-present">Mevcut</span></td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error('Kayıtlar yüklenemedi:', error);
            }
        }

        function showMessage(section, message, type) {
            const messageDiv = document.getElementById(`${section}-message`);
            messageDiv.textContent = message;
            messageDiv.className = `message ${type}`;
            
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 5000);
        }

        // Sayfa yüklendiğinde öğrencileri yükle
        document.addEventListener('DOMContentLoaded', () => {
            loadStudents();
        });
    </script>
</body>
</html>
